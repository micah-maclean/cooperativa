services:
  postgres:
    image: postgres:16-alpine
    container_name: cooperativa-postgres
    environment:
      POSTGRES_DB: cooperativa
      POSTGRES_USER: cooperativa
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cooperativa -d cooperativa"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cooperativa-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cooperativa
      SPRING_DATASOURCE_USERNAME: cooperativa
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"

volumes:
  postgres-data: